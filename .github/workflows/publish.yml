name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm install

      - name: "Build a Tauri App"
        uses: tauri-apps/tauri-action@v0
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.ref_name }}
          tagName: v__VERSION__
          releaseName: "ClamAV GUI v__VERSION__"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          releaseBody: |
            ## What's Changed?

            [Add a changelog]

            **Full Changelog:** [`clamav-gui/CHANGELOG.md`](https://github.com/ArsenTech/clamav-gui/blob/main/CHANGELOG.md)

            ---

            ## Downloads
            ### :penguin: Linux
            - **rpm** - [ClamAV.GUI-__VERSION__-1.x86_64.rpm][linux-rpm]
            - **AppImage** - [ClamAV.GUI___VERSION___amd64.AppImage][linux-app-image]
            - **deb** - [ClamAV.GUI___VERSION___amd64.deb][linux-deb]

            ### :window: Windows
            - **exe** - [ClamAV.GUI___VERSION___x64-setup.exe][windows-exe]
            - **msi** - [ClamAV.GUI___VERSION___x64_en-US.msi][windows-msi]

            ### :green_apple: macOS (ARM64)
            - **dmg** - [ClamAV.GUI___VERSION___aarch64.dmg][mac-arm64-dmg]
            - **app.tar.gz** - [ClamAV.GUI_aarch64.app.tar.gz][mac-arm64-tar]

            ### :apple: macOS (x86)
            - **dmg** - [ClamAV.GUI___VERSION___x64.dmg][mac-x64-dmg]
            - **app.tar.gz** - [ClamAV.GUI_x64.app.tar.gz][mac-x64-tar]

            [mac-arm64-dmg]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI___VERSION___aarch64.dmg
            [mac-x64-dmg]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI___VERSION___x64.dmg
            [mac-arm64-tar]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI_aarch64.app.tar.gz
            [mac-x64-tar]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI_x64.app.tar.gz

            [windows-exe]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI___VERSION___x64-setup.exe
            [windows-msi]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI___VERSION___x64_en-US.msi

            [linux-rpm]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI-__VERSION__-1.x86_64.rpm
            [linux-app-image]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI___VERSION___amd64.AppImage
            [linux-deb]: https://github.com/ArsenTech/clamav-gui/releases/download/v__VERSION__/ClamAV.GUI___VERSION___amd64.deb

      - name: Test Build (PR / workflow_dispatch)
        uses: tauri-apps/tauri-action@v0
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        with:
          args: ${{ matrix.args }} --no-bundle
